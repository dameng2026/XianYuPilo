name: Build and Publish Docker Images

# 每次推送到 main 分支自动构建 api/web/crawler 镜像并推送到 GHCR，
# 并在配置阿里云 ACR 凭证后同步镜像到国内 registry（国内拉取加速）。
# 也可在 Actions 页面手动触发。镜像标签：latest + git 短 SHA。
# 多架构（linux/amd64 + linux/arm64）manifest，覆盖 x86 服务器与 Apple Silicon Mac。
#
# 阿里云 ACR 个人版同步（可选）：
#   在仓库 Settings → Variables 配置：
#     ALIYUN_ACR_REGISTRY   = registry.cn-hangzhou.aliyuncs.com（按实际地域）
#     ALIYUN_ACR_NAMESPACE  = xianyu-assistant（ACR 命名空间）
#   在仓库 Settings → Secrets 配置：
#     ALIYUN_ACR_USERNAME   = 阿里云账号（或 RAM 子账号）
#     ALIYUN_ACR_PASSWORD   = ACR 访问凭证（在 ACR 控制台「访问凭证」设置的固定密码）
#   未配置时自动跳过 ACR 同步，仅推 GHCR，不影响现有流程。
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  # 镜像命名空间，与 docker-compose.yml 中各服务的 image 默认值保持一致。
  # 如需修改，同步更新 .env.example 的 IMAGE_NAMESPACE 与 docker-compose.yml。
  IMAGE_NAMESPACE: xianyu-assistant-opensource

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: api
            context: ./apps/api
          - component: web
            context: ./apps/web
          - component: crawler
            context: ./apps/crawler
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 阿里云 ACR 登录（仅当仓库配置了 ACR Variables + Secrets 时执行）
      - name: Log in to Aliyun ACR
        if: ${{ vars.ALIYUN_ACR_REGISTRY != '' && secrets.ALIYUN_ACR_PASSWORD != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.ALIYUN_ACR_REGISTRY }}
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      - name: Derive image tags
        id: tags
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.component }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAMESPACE }}/xianyu-assistant-${{ matrix.component }}:latest
            ghcr.io/${{ env.IMAGE_NAMESPACE }}/xianyu-assistant-${{ matrix.component }}:${{ steps.tags.outputs.sha }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
          provenance: false

      # 将已推送的 GHCR 多架构 manifest 同步到阿里云 ACR（不重新构建，秒级完成）。
      # 仅当 ACR 凭证已配置时执行；ACR 镜像需在控制台预先创建（首次推送前）。
      - name: Mirror to Aliyun ACR
        if: ${{ vars.ALIYUN_ACR_REGISTRY != '' && secrets.ALIYUN_ACR_PASSWORD != '' }}
        run: |
          set -e
          SRC="ghcr.io/${IMAGE_NAMESPACE}/xianyu-assistant-${{ matrix.component }}:latest"
          ACR_BASE="${{ vars.ALIYUN_ACR_REGISTRY }}/${{ vars.ALIYUN_ACR_NAMESPACE }}/xianyu-assistant-${{ matrix.component }}"
          echo "Mirroring ${SRC} -> ${ACR_BASE}:{latest,${{ steps.tags.outputs.sha }}}"
          docker buildx imagetools create \
            -t "${ACR_BASE}:latest" \
            -t "${ACR_BASE}:${{ steps.tags.outputs.sha }}" \
            "${SRC}"
          echo "ACR sync completed."
