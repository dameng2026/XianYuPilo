worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
  worker_connections 2048;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format structured escape=json
    '{"time":"$time_iso8601","remote":"$remote_addr","request_id":"$request_id",'
    '"method":"$request_method","uri":"$uri","status":$status,'
    '"bytes":$body_bytes_sent,"duration":$request_time,"upstream":"$upstream_response_time"}';
  access_log /dev/stdout structured;

  server_tokens off;
  sendfile on;
  tcp_nopush on;
  keepalive_timeout 30s;
  keepalive_requests 1000;
  types_hash_max_size 2048;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types application/json application/javascript application/xml image/svg+xml text/css text/plain;

  limit_req_status 429;
  limit_conn_status 429;
  limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=20r/s;
  limit_req_zone $binary_remote_addr zone=login_per_ip:10m rate=5r/m;
  limit_conn_zone $binary_remote_addr zone=connections_per_ip:10m;

  map $http_x_forwarded_proto $sanitized_forwarded_proto {
    default http;
    https https;
  }

  client_body_temp_path /tmp/client_temp;
  proxy_temp_path /tmp/proxy_temp;
  fastcgi_temp_path /tmp/fastcgi_temp;
  uwsgi_temp_path /tmp/uwsgi_temp;
  scgi_temp_path /tmp/scgi_temp;

  include /etc/nginx/conf.d/*.conf;
}
